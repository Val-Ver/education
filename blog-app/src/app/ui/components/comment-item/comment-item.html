<mat-card class="comment">
  <mat-card-header class="comment-header">
    <mat-card-title>{{ comment.author }}</mat-card-title>
    <mat-card-subtitle class="comment-date">{{ comment.dateTime }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p class="comment-content">{{ comment.content }}</p>
  </mat-card-content>
  <mat-card-actions class="comment-rating">
    <button mat-icon-button (click)="changeRating(-1)">
      <mat-icon>thumb_down</mat-icon>
    </button>
    <span class="post-rating">{{ comment.rating }}</span>
    <button mat-icon-button (click)="changeRating(1)">
      <mat-icon>thumb_up</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
