
<aside class="admin-panel">
  <button mat-icon-button class="admin-btn"
          id="create-post-btn"
          title="Создать новую статью"
          (click)="showForm()">
    <mat-icon>post_add</mat-icon>
  </button>
  <button mat-icon-button class="admin-btn"
          id="show-stats-btn"
          title="Посмотреть статистику блога"
          (click)="showModal()">
    <mat-icon>bar_chart</mat-icon>
  </button>
</aside>
