<div class="comment-form">
  <h3>Добавить комментарий</h3>
  <form [formGroup]="commentForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="author">Имя / Ник *</label>
      <input id="author" type="text" formControlName="author" placeholder="Ваше имя">
      @if (author?.invalid && author?.touched) {
        <div class="error-message">Имя обязательно</div>
      }
    </div>
    <div class="form-group">
      <label for="content">Комментарий *</label>
      <textarea id="content" formControlName="content" rows="4" placeholder="Ваш комментарий"></textarea>
      @if (content?.invalid && content?.touched) {
        <div class="error-message">Текст комментария обязателен</div>
      }
    </div>
    <div class="form-buttons">
      <button type="submit" [disabled]="commentForm.invalid">Отправить</button>
    </div>
  </form>
</div>
