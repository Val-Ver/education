  <section class="about-author">
    <h1>Мой блог</h1>
    <p>Актуальные статьи</p>
  </section>

  <section id="articles-container" class="articles" >
    @for(article of displayedArticles; track article.id; let first = $first) {
      <app-article-card class="article-card" layout="blog"
        [article]="article"
        [isFeatured]="first"
        [showDelete]="true"
        (edit)="editArticle($event)"
        (delete)="deleteArticle($event)"
      ></app-article-card>
    } @empty {
      <div id="empty-page" class="empty-page">
        <h2>Пока нет ни одной статьи</h2>
      </div>
    }
  </section>

  <app-form [visible]="isFormVisible" [articleToEdit]="editingArticle" (close)="hideForm()"></app-form>
  <app-admin-panel (creatPost)="showForm()" (showStats)="showModal()"></app-admin-panel>

  @if(isStatsModalVisible) {
    <app-modal-dialog [articlesCount]="statsArticlesCount"
                      (close)="closeStatsModal()">
    </app-modal-dialog>
  }

  @if(totalPages > 1) {
    <div class="pagination">
      <button (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">Назад</button>
      <span>Страница {{ currentPage }} из {{ totalPages }}</span>
      <button (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">Вперёд</button>
    </div>
  }
