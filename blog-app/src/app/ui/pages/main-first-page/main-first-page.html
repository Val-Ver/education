  <div class="author-info">
    <app-author-info></app-author-info>
  </div>

  @if(previewArticles().length > 0) {
    <section id="article-preview" class="article-preview">
      <h2>Последние статьи</h2>

      @for(article of previewArticles(); track article.id; ) {
        <app-article-card layout="preview"
          [article]="article"
          [isFeatured]="false"
          [showDelete]="false"
        ></app-article-card>
      }
      <a routerLink="/blog">Посмотреть все статьи</a>
    </section>
  }

  <div class="work-experience">
    <app-work-experience></app-work-experience>
  </div>

  <div class="achievements">
    <app-achievements></app-achievements>
  </div>

  <div class="hobby">
    <app-hobby></app-hobby>
  </div>
