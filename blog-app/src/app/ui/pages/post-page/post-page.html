<div class="post-container">
  @if (post()) {
    <article class="post">
      <div class="post-img img" [style.background-image]="'url(' + post()!.img + ')'"></div>
      <h1>{{ post()!.heading }}</h1>
      <div class="post-rating">
        <button (click)="changeRating(-1)" [disabled]="isRatingUpdating">-</button>
        <span>{{ post()!.rating }}</span>
        <button (click)="changeRating(1)" [disabled]="isRatingUpdating">+</button>
      </div>
      <p class="post-date">{{ post()!.dateTime }}</p>
      <div class="post-content">{{ post()!.content }}</div>
    </article>

    <app-comment-form (commentAdded)="onCommentAdded($event)"></app-comment-form>

    <app-comment-list [comments]="comments()" (ratingChanged)="onCommentRatingChanged($event)"></app-comment-list>
  } @else {
    <p>Загрузка статьи...</p>
  }
</div>
